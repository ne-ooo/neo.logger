skills:
  - name: 'Getting Started'
    slug: 'getting-started'
    domain: 'setup'
    description: 'Set up the logger for the first time — default logger, createLogger(), log levels, child loggers, and structured data'
    type: 'lifecycle'
    covers:
      - 'Logger class'
      - 'createLogger() factory'
      - 'default logger export'
      - 'LogLevel enum'
      - 'parseLevel()'
      - 'shouldLog()'
      - 'setLevel() / getLevel()'
      - 'child() loggers'
      - 'LOG_LEVEL environment variable'
      - 'structured data parameter'
      - 'error() overloaded signature'
    tasks:
      - 'Install and import the logger'
      - 'Log messages at different levels with structured data'
      - 'Configure log level via code or LOG_LEVEL env var'
      - 'Create child loggers for modules'
      - 'Log errors with Error objects'
    failure_modes:
      - mistake: 'Misusing logger.error() overloaded signature'
        mechanism: 'logger.error() accepts (message, error?, data?) but if the second argument is a plain object (not an Error instance), it is treated as data, not an error. Agents may pass a plain object expecting it to be logged as an error.'
        wrong_pattern: |
          // Agent passes a plain object as second arg expecting error logging
          logger.error('Failed', { code: 'TIMEOUT', message: 'Request timed out' })
          // The object is treated as data, not an error — no stack trace
        correct_pattern: |
          // Pass an actual Error object, then data separately
          logger.error('Failed', new Error('Request timed out'), { code: 'TIMEOUT' })
          // Or if you only have data (no Error), this is fine — but know it's data, not error
          logger.error('Failed', { code: 'TIMEOUT' })
        source: 'src/core/logger.ts:90-102 — instanceof Error check'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['getting-started']

      - mistake: 'Using winston-style log method'
        mechanism: 'Agents trained on winston may call logger.log("info", "message") which does not exist in neo.logger. The Logger class has no public log() method — only debug(), info(), warn(), error().'
        wrong_pattern: |
          logger.log('info', 'Server started', { port: 3000 })
        correct_pattern: |
          logger.info('Server started', { port: 3000 })
        source: 'src/core/logger.ts — log() is private'
        priority: 'HIGH'
        status: 'active'
        skills: ['getting-started', 'migrate-from-winston']

      - mistake: 'Invalid log level silently defaults to INFO'
        mechanism: 'parseLevel() returns LogLevel.INFO for unrecognized strings instead of throwing. An agent passing a typo like "verbose" or "trace" gets INFO without any warning.'
        wrong_pattern: |
          const logger = createLogger({ level: 'verbose' })
          // Silently defaults to INFO — debug messages are suppressed
        correct_pattern: |
          // Use only valid levels: debug, info, warn, error, silent
          const logger = createLogger({ level: 'debug' })
        source: 'src/core/level.ts:57 — default case returns INFO'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['getting-started']

      - mistake: 'Expecting logger methods to return Promises'
        mechanism: 'debug(), info(), warn() return void (not Promise). Transport writes are fire-and-forget internally. Agents may try to await logger.info() expecting it to confirm the write completed.'
        wrong_pattern: |
          await logger.info('Server started', { port: 3000 })
          // No error, but await does nothing — write may not be complete
        correct_pattern: |
          logger.info('Server started', { port: 3000 })
          // Fire and forget — transport errors go to stderr
        source: 'src/core/logger.ts:148-156 — fire and forget pattern'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['getting-started']

  - name: 'Custom Transports'
    slug: 'custom-transports'
    domain: 'delivery'
    description: 'Build custom transports to send logs to external services, databases, or monitoring platforms'
    type: 'core'
    covers:
      - 'Transport interface'
      - 'CustomTransport class'
      - 'ConsoleTransport'
      - 'FileTransport'
      - 'LogEntry shape'
      - 'Multiple transports'
      - 'File rotation (shouldRotate, rotateFiles)'
      - 'formatConsole() and formatJSON()'
    tasks:
      - 'Create a custom transport for an external logging service'
      - 'Configure multiple transports simultaneously'
      - 'Set up file logging with rotation'
      - 'Choose between JSON and text format for file output'
    failure_modes:
      - mistake: 'Implementing Transport interface without async write'
        mechanism: 'The Transport interface requires write() to return Promise<void>. An agent may implement a synchronous write method that returns void instead of a Promise.'
        wrong_pattern: |
          class MyTransport implements Transport {
            write(entry: LogEntry): void {
              console.log(entry.message)
            }
          }
        correct_pattern: |
          class MyTransport implements Transport {
            async write(entry: LogEntry): Promise<void> {
              console.log(entry.message)
            }
          }
        source: 'src/types.ts:34-37 — Transport interface'
        priority: 'HIGH'
        status: 'active'
        skills: ['custom-transports']

      - mistake: 'Throwing errors in custom transport handlers'
        mechanism: 'Transport write errors are caught and written to stderr. If a custom transport throws, the error is silently swallowed (logged to stderr only). Agents may not realize they need their own error handling inside the transport.'
        wrong_pattern: |
          new CustomTransport(async (entry) => {
            const res = await fetch(url, { method: 'POST', body: JSON.stringify(entry) })
            // If fetch fails, error goes to stderr and is lost
          })
        correct_pattern: |
          new CustomTransport(async (entry) => {
            try {
              await fetch(url, { method: 'POST', body: JSON.stringify(entry) })
            } catch (err) {
              // Handle retry, queue, or fallback explicitly
              await fallbackLog(entry)
            }
          })
        source: 'src/core/logger.ts:151-153 — catch writes to stderr'
        priority: 'HIGH'
        status: 'active'
        skills: ['custom-transports']

      - mistake: 'Using pino-style transport configuration'
        mechanism: 'Agents may use pino patterns like { transport: { target: "..." } } instead of passing transport class instances in an array.'
        wrong_pattern: |
          const logger = createLogger({
            transport: { target: 'pino-pretty' }
          })
        correct_pattern: |
          const logger = createLogger({
            transports: [new ConsoleTransport({ colors: true })]
          })
        source: 'src/types.ts:28 — transports is Transport[]'
        priority: 'HIGH'
        status: 'active'
        skills: ['custom-transports', 'migrate-from-pino']

      - mistake: 'FileTransport rotation naming convention confusion'
        mechanism: 'Rotated files use the pattern file.log.1, file.log.2 (not file.1.log). Agents may reference the wrong naming scheme in documentation or helper scripts.'
        wrong_pattern: |
          // Expecting app.1.log, app.2.log
          const backups = ['app.1.log', 'app.2.log']
        correct_pattern: |
          // Actual pattern: app.log.1, app.log.2
          const backups = ['app.log.1', 'app.log.2']
        source: 'src/utils/rotate.ts:50 — `${path}.${maxFiles}` pattern'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['custom-transports']

  - name: 'Migrate from Winston'
    slug: 'migrate-from-winston'
    domain: 'adoption'
    description: 'Replace winston with neo.logger — map concepts, rewrite configuration, and handle API differences'
    type: 'lifecycle'
    covers:
      - 'winston.createLogger → createLogger'
      - 'winston.format → formatConsole/formatJSON'
      - 'winston.transports → ConsoleTransport/FileTransport'
      - 'winston log levels mapping'
    tasks:
      - 'Replace winston imports and configuration'
      - 'Map winston transports to neo.logger transports'
      - 'Replace winston format pipeline with neo.logger formatters'
      - 'Update error logging patterns'
    failure_modes:
      - mistake: 'Using winston format pipeline'
        mechanism: 'Winston uses winston.format.combine(format.timestamp(), format.json()). Neo.logger has no format pipeline — formatting is handled by transport choice (ConsoleTransport for pretty, FileTransport with format: "json" for structured).'
        wrong_pattern: |
          const logger = createLogger({
            format: combine(timestamp(), json()),
            transports: [new ConsoleTransport()]
          })
        correct_pattern: |
          const logger = createLogger({
            transports: [
              new ConsoleTransport({ colors: true }),
              new FileTransport({ path: 'app.log', format: 'json' })
            ]
          })
        source: 'src/types.ts:22-29 — LoggerOptions has no format field'
        priority: 'HIGH'
        status: 'active'
        skills: ['migrate-from-winston']

      - mistake: 'Using winston log level names like "verbose" or "silly"'
        mechanism: 'Winston supports verbose, silly, http levels. Neo.logger only supports debug, info, warn, error, silent. Invalid levels silently default to INFO.'
        wrong_pattern: |
          logger.setLevel('verbose')
          // Silently becomes INFO
        correct_pattern: |
          logger.setLevel('debug')
          // Use debug as the most verbose level
        source: 'src/core/level.ts:43-58 — only 5 levels recognized'
        priority: 'HIGH'
        status: 'active'
        skills: ['migrate-from-winston', 'getting-started']

      - mistake: 'Expecting winston-style level-based transport filtering'
        mechanism: 'Winston allows setting a level per transport. Neo.logger has a single level on the Logger instance — all transports receive the same entries. To filter by level per transport, you need a CustomTransport wrapper.'
        wrong_pattern: |
          new FileTransport({ path: 'errors.log', level: 'error' })
          // level option does not exist on FileTransport
        correct_pattern: |
          new CustomTransport(async (entry) => {
            if (entry.level === 'error') {
              await appendFile('errors.log', JSON.stringify(entry) + '\n')
            }
          })
        source: 'src/types.ts:52-63 — FileTransportOptions has no level field'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['migrate-from-winston']

  - name: 'Migrate from Pino'
    slug: 'migrate-from-pino'
    domain: 'adoption'
    description: 'Replace pino with neo.logger — map concepts, rewrite configuration, and handle API differences'
    type: 'lifecycle'
    covers:
      - 'pino() → createLogger()'
      - 'pino transports → ConsoleTransport/FileTransport'
      - 'pino child loggers → logger.child()'
      - 'pino-pretty → built-in ConsoleTransport'
    tasks:
      - 'Replace pino imports and initialization'
      - 'Remove pino-pretty dependency (built-in with neo.logger)'
      - 'Map pino child logger patterns'
      - 'Update transport configuration'
    failure_modes:
      - mistake: 'Using pino child logger with bindings object'
        mechanism: 'Pino child() accepts an object of bindings: logger.child({ module: "db" }). Neo.logger child() accepts a string namespace only.'
        wrong_pattern: |
          const child = logger.child({ module: 'database', requestId: '123' })
        correct_pattern: |
          const child = logger.child('database')
          // For request-scoped data, pass it in each log call
          child.info('Query executed', { requestId: '123' })
        source: 'src/core/logger.ts:176 — child(namespace: string)'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['migrate-from-pino']

      - mistake: 'Expecting pino-style serializers'
        mechanism: 'Pino supports custom serializers for Error objects, req/res. Neo.logger has built-in error serialization but no configurable serializers.'
        wrong_pattern: |
          const logger = createLogger({
            serializers: { err: pino.stdSerializers.err }
          })
        correct_pattern: |
          // Neo.logger handles Error serialization automatically
          const logger = createLogger({ level: 'info' })
          logger.error('Failed', new Error('something broke'))
        source: 'src/types.ts:22-29 — no serializers option'
        priority: 'HIGH'
        status: 'active'
        skills: ['migrate-from-pino']

      - mistake: 'Using pino worker thread transport pattern'
        mechanism: 'Pino uses worker threads for transports via target strings. Neo.logger uses simple class instances — no worker threads, no target strings.'
        wrong_pattern: |
          const logger = createLogger({
            transport: {
              targets: [
                { target: 'pino/file', options: { destination: 'app.log' } }
              ]
            }
          })
        correct_pattern: |
          const logger = createLogger({
            transports: [
              new FileTransport({ path: 'app.log', format: 'json' })
            ]
          })
        source: 'src/types.ts:28 — transports: Transport[]'
        priority: 'HIGH'
        status: 'active'
        skills: ['migrate-from-pino']

  - name: 'Go to Production'
    slug: 'go-to-production'
    domain: 'adoption'
    description: 'Production readiness checklist — file rotation, JSON output, error handling, log level management, and transport reliability'
    type: 'lifecycle'
    covers:
      - 'File rotation configuration'
      - 'JSON format for log aggregation'
      - 'LOG_LEVEL environment variable'
      - 'Error logging best practices'
      - 'Transport error handling'
      - 'Performance considerations'
    tasks:
      - 'Configure file logging with rotation for production'
      - 'Set up JSON output for log aggregation (ELK, Datadog, etc.)'
      - 'Configure log levels via environment variables'
      - 'Handle transport failures gracefully'
      - 'Optimize logging performance for high-throughput services'
    failure_modes:
      - mistake: 'Forgetting to enable rotation on FileTransport'
        mechanism: 'FileTransport defaults rotate to false. In production, log files grow unbounded without explicit rotate: true, eventually filling disk.'
        wrong_pattern: |
          new FileTransport({ path: '/var/log/app.log', format: 'json' })
          // rotate defaults to false — file grows forever
        correct_pattern: |
          new FileTransport({
            path: '/var/log/app.log',
            format: 'json',
            rotate: true,
            maxSize: 10 * 1024 * 1024,
            maxFiles: 5
          })
        source: 'src/core/transport.ts:65 — rotate defaults to false'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['go-to-production']

      - mistake: 'Using ConsoleTransport colors in production'
        mechanism: 'ConsoleTransport auto-detects TTY for colors, but in some production environments (Docker with TTY allocated), ANSI codes pollute log aggregators.'
        wrong_pattern: |
          new ConsoleTransport()
          // May auto-detect TTY as true in Docker
        correct_pattern: |
          new ConsoleTransport({ colors: false })
          // Explicitly disable colors for production/log aggregation
        source: 'src/core/transport.ts:23 — colors defaults to process.stdout.isTTY'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['go-to-production']

      - mistake: 'Not using JSON format for production log aggregation'
        mechanism: 'Agents may default to ConsoleTransport (pretty) for production, but log aggregators (ELK, Datadog, CloudWatch) need structured JSON from FileTransport with format: "json".'
        wrong_pattern: |
          // Production setup with only console output
          const logger = createLogger({ level: 'info' })
        correct_pattern: |
          const logger = createLogger({
            level: process.env.LOG_LEVEL || 'info',
            transports: [
              new ConsoleTransport({ colors: false }),
              new FileTransport({ path: 'app.log', format: 'json', rotate: true })
            ]
          })
        source: 'README.md — Next.js integration example'
        priority: 'HIGH'
        status: 'active'
        skills: ['go-to-production']

tensions:
  - name: 'Simplicity vs per-transport filtering'
    skills: ['getting-started', 'custom-transports']
    description: 'Neo.logger has a single log level per Logger instance. There is no per-transport level filtering like winston offers.'
    implication: 'An agent optimizing for production observability may try to send errors to one file and all logs to another using transport-level filtering, which requires a CustomTransport wrapper — not a built-in option.'

  - name: 'Fire-and-forget vs delivery guarantees'
    skills: ['custom-transports', 'go-to-production']
    description: 'Transport writes are fire-and-forget with errors going to stderr. This maximizes performance but provides no delivery guarantee.'
    implication: 'An agent building a production logging pipeline may assume log writes are confirmed when the method returns, or may not implement retry logic in custom transports because it expects the framework to handle failures.'

  - name: 'Migration simplicity vs feature gap'
    skills: ['migrate-from-winston', 'migrate-from-pino']
    description: 'Neo.logger is simpler than winston/pino, which means some features (per-transport levels, serializers, worker threads) have no direct equivalent.'
    implication: 'An agent doing a migration may try to map every winston/pino feature 1:1, producing invalid configuration. The correct approach is to simplify — drop features that neo.logger handles differently.'

